services:
  - type: web
    name: btm-backend
    env: python3
    buildCommand: |
      pip install -r requirements.txt
      python global_site/backend/seed.py
    startCommand: uvicorn global_site.backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: btm-db
          property: connectionString
      - key: EIA_API_KEY
        value: ${EIA_API_KEY}
      - key: FRONTEND_URL
        value: ${FRONTEND_URL}
      - key: ENVIRONMENT
        value: production

databases:
  - name: btm-db
    databaseName: btm_heatmap
    user: btm_user
    plan: free