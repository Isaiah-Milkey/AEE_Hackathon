services:
  - type: web
    name: btm-backend
    env: python
    plan: free
    buildCommand: pip install -r global_site/backend/requirements.txt
    startCommand: uvicorn global_site.backend.main:app --host 0.0.0.0 --port 8000
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        fromDatabase:
          name: aee_hackathon
          property: connectionString
      - key: FRONTEND_URL
        value: aee-hackathon.vercel.app
        # Replace YOUR_VERCEL_URL after you deploy frontend
      - key: EIA_API_KEY
        sync: false
        # You'll set this in the Render dashboard