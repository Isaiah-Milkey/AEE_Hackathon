services:
  - type: web
    name: btm-backend
    env: python
    plan: free
    buildCommand: cd global_site/backend && pip install -r requirements.txt
    startCommand: cd global_site/backend && uvicorn main:app --host 0.0.0.0 --port 8000
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        fromDatabase:
          name: aee_hackathon
          property: connectionString
      - key: FRONTEND_URL
        value: https://aee-hackathon.vercel.app
      - key: EIA_API_KEY
        sync: false